services:
  postgres:
    image: postgres:16-alpine
    container_name: sorteio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sorteio_dev
      POSTGRES_USER: sorteio
      POSTGRES_PASSWORD: sorteio123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sorteio -d sorteio_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
